name: Rain Alert
on:
  schedule:
    # ╔═══════════════════════════════════════════════════════════════╗
    # ║  CHANGE THE LINE BELOW to set when your script runs          ║
    # ║                                                                ║
    # ║  Format:  'MINUTE HOUR * * *'                                  ║
    # ║                                                                ║
    # ║  Examples:                                                     ║
    # ║    '0 9 * * *'   = 9:00 AM UTC daily                          ║
    # ║    '30 14 * * *' = 2:30 PM UTC daily                   s       ║
    # ║    '0 0 * * *'   = Midnight UTC daily                         ║
    # ║                                                                ║
    # ║  Use https://time.is/UTC to find your local time in UTC       ║
    # ╚═══════════════════════════════════════════════════════════════╝
    - cron: '39 00 * * *'
  # This adds a "Run workflow" button so you can test manually
  workflow_dispatch:

jobs:
  run:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.12'

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r week-11/Rain-Alert/requirements.txt

      - name: Run script
        env:
          # Your secrets are available as environment variables
          # Add more secrets in Settings > Secrets > Actions
          TWILIO_ACCOUNT_SID: ${{ secrets.TWILIO_ACCOUNT_SID }}
          TWILIO_AUTH_TOKEN: ${{ secrets.TWILIO_AUTH_TOKEN }}
          MY_NUMBER: ${{ secrets.MY_NUMBER }}
          TWILIO_NUMBER: ${{ secrets.TWILIO_NUMBER }}
          TWILIO_API_KEY: ${{ secrets.TWILIO_API_KEY }}
        run: python week-11/Rain-Alert/main.py